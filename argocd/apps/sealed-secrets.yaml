# Sealed Secrets controller — lets secrets live in git as SealedSecret CRs
# that only this cluster can decrypt. Seal new values with
# scripts/06-seal-secrets.sh (or kubeseal directly, see COMMANDS.md).
#
# Runs in kube-system under the name kubeseal expects by default
# (sealed-secrets-controller), so `kubeseal --fetch-cert` works flag-free.
#
# IMPORTANT: back up the sealing keypair off-cluster, or a cluster rebuild
# makes every SealedSecret in git undecryptable:
#   kubectl get secret -n kube-system \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml > sealing-key-backup.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    # Wave 1: alongside keda/kured, before every app that consumes a SealedSecret.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    # Upgrade = version bump here + commit (same pattern as the Argo CD pin).
    targetRevision: 2.17.4
    helm:
      releaseName: sealed-secrets-controller
      valuesObject:
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
