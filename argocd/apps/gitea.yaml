# Gitea Helm chart — multi-source app: the chart from the Gitea Helm repo,
# the values file from this repo. Requires the gitea-admin secret — sealed
# into git by scripts/06-seal-secrets.sh (synced by the gitea-config app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://dl.gitea.com/charts/
      chart: gitea
      targetRevision: 12.6.0
      helm:
        releaseName: gitea
        valueFiles:
          - $values/apps/gitea/values.yaml
          # Generated by scripts/06-seal-secrets.sh from terraform.tfvars'
          # gitea_oidc_providers - an empty oauth list is a safe no-op.
          - $values/apps/gitea/values-oidc.yaml
          # Generated by scripts/06-seal-secrets.sh from terraform.tfvars'
          # gitea_ldap_providers - an empty ldap list is a safe no-op.
          - $values/apps/gitea/values-ldap.yaml
    - repoURL: https://github.com/TandemIT/manifests.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
