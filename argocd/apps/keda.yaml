# KEDA operator - wave 1 so its CRDs exist before the runner ScaledObject
# (wave 6) syncs. Split out of the former monolithic "platform" Application;
# the network foundation (MetalLB, CoreDNS) is now applied at bootstrap by
# scripts/01-bootstrap-first-master.sh, outside Argo CD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TandemIT/manifests.git
    targetRevision: master
    path: apps/keda
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Required: the KEDA scaledjobs CRD exceeds the 262144-byte
      # last-applied-configuration annotation limit of client-side apply.
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
