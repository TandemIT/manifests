# Anubis sits between Traefik and each protected backend (reverse proxy
# mode); deployed before Gitea so the IngressRoute and certificate exist
# before traffic arrives. Requires the anubis-key secret generated by
# scripts/01-bootstrap-first-master.sh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anubis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TandemIT/manifests.git
    targetRevision: master
    path: apps/anubis
  destination:
    server: https://kubernetes.default.svc
    namespace: anubis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
