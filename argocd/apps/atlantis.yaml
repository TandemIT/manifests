# Atlantis + Garage S3 backend. In-app wave ordering: Garage (wave 0) →
# garage-bootstrap Job (wave 1: cluster layout + S3 credentials) → Atlantis
# StatefulSet (wave 2). atlantis-vcs is a SealedSecret from
# scripts/06-seal-secrets.sh; until it is sealed and committed, Atlantis
# stays in CreateContainerConfigError and Argo CD reports Progressing.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlantis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TandemIT/manifests.git
    targetRevision: master
    path: apps/atlantis
  destination:
    server: https://kubernetes.default.svc
    namespace: atlantis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
