# Act Runner + KEDA ScaledObject. The runtime tokens are minted against the
# live Gitea API by the in-app runner-token-bootstrap Job (wave 0); the
# Deployment and ScaledObject sync at wave 1, after real tokens exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-runner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/TandemIT/manifests.git
    targetRevision: master
    path: apps/gitea-runner
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
