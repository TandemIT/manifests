apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gitea-runner
  labels:
    app.kubernetes.io/name: gitea-runner
    app.kubernetes.io/part-of: ci-runners
  annotations:
    # Wave 1: sync only after the runner-token-bootstrap Job (wave 0) has
    # minted the KEDA API token.
    argocd.argoproj.io/sync-wave: "1"
spec:
  scaleTargetRef:
    name: gitea-runner
  minReplicaCount: 5
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 120
  # Hold at 5 replicas if the Gitea API is unreachable for 3 consecutive polls.
  fallback:
    failureThreshold: 3
    replicas: 5
  triggers:
    - type: github-runner
      metadata:
        githubApiURL: https://git.open-ict.hu/api/v1
        runnerScope: org
        owner: CI
        labels: ubuntu-latest,ubuntu-24.04,ubuntu-22.04
        noDefaultLabels: "true"
      authenticationRef:
        name: gitea-keda-auth
