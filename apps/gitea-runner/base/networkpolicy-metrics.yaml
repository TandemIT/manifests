apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitea-runner-allow-metrics
  labels:
    app.kubernetes.io/name: gitea-runner
    app.kubernetes.io/part-of: ci-runners
spec:
  podSelector:
    matchLabels:
      app: gitea-runner
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9101