# RBAC for the runner-token-bootstrap Job: create/refresh the two token
# secrets in this namespace. Read access to gitea/gitea-admin is granted by
# a Role in the gitea namespace (apps/gitea/rbac-runner-bootstrap.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-token-bootstrap
  labels:
    app.kubernetes.io/name: runner-token-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-token-bootstrap
  labels:
    app.kubernetes.io/name: runner-token-bootstrap
rules:
  # create cannot be restricted by resourceName
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitea-runner-registration", "gitea-api-token"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-token-bootstrap
  labels:
    app.kubernetes.io/name: runner-token-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner-token-bootstrap
subjects:
  - kind: ServiceAccount
    name: runner-token-bootstrap
    namespace: gitea-runners
