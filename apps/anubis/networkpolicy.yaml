apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anubis-restrict
  namespace: anubis
  labels:
    app.kubernetes.io/name: anubis
    app.kubernetes.io/part-of: ingress-protection
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: anubis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # OG_PASSTHROUGH: Anubis fetches Open Graph metadata from Gitea
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gitea
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitea
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
