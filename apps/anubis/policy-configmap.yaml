apiVersion: v1
kind: ConfigMap
metadata:
  name: anubis-policy
  namespace: anubis
  labels:
    app.kubernetes.io/name: anubis
    app.kubernetes.io/part-of: ingress-protection
data:
  policy.yaml: |
    bots:
      # Block known malicious bots and pathological scrapers
      - import: (data)/bots/_deny-pathological.yaml
      - import: (data)/bots/aggressive-brazilian-scrapers.yaml

      # Block aggressive AI/LLM training scrapers
      - import: (data)/meta/ai-block-aggressive.yaml

      # Allow legitimate search engine crawlers (Google, Bing, DuckDuckGo, Kagi, etc.)
      - import: (data)/crawlers/_allow-good.yaml

      # Challenge Firefox AI preview feature
      - import: (data)/clients/x-firefox-ai.yaml

      # Allow well-known routes (robots.txt, favicon, /.well-known/*)
      - import: (data)/common/keep-internet-working.yaml

      # Allow git CLI (clone, fetch, push, pull)
      - name: git-client
        user_agent_regex: "^git/"
        action: ALLOW

      # Allow curl-based tooling (Gitea Actions runner, CI scripts)
      - name: ci-curl
        user_agent_regex: "^curl/"
        action: ALLOW

      # Browser-like traffic gains weight; thresholds below decide the challenge level
      - name: generic-browser
        user_agent_regex: "Mozilla|Opera"
        action: WEIGH
        weight:
          adjust: 10

    thresholds:
      - name: minimal-suspicion
        expression: weight <= 0
        action: ALLOW
      - name: mild-suspicion
        expression:
          all:
            - weight > 0
            - weight < 10
        action: CHALLENGE
        challenge:
          algorithm: metarefresh
          difficulty: 1
      - name: moderate-suspicion
        expression:
          all:
            - weight >= 10
            - weight < 20
        action: CHALLENGE
        challenge:
          algorithm: fast
          difficulty: 2
      - name: mild-proof-of-work
        expression:
          all:
            - weight >= 20
            - weight < 30
        action: CHALLENGE
        challenge:
          algorithm: fast
          difficulty: 4
      - name: extreme-suspicion
        expression: weight >= 30
        action: CHALLENGE
        challenge:
          algorithm: fast
          difficulty: 6

    status_codes:
      CHALLENGE: 200
      DENY: 200

    store:
      backend: memory
      parameters: {}
