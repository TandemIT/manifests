apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlantis
  namespace: atlantis
  labels:
    app.kubernetes.io/name: atlantis
    app.kubernetes.io/part-of: gitops
spec:
  serviceName: atlantis
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: atlantis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlantis
        app.kubernetes.io/part-of: gitops
    spec:
      serviceAccountName: atlantis
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.31.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4141
          env:
            - name: ATLANTIS_DATA_DIR
              value: /atlantis
            - name: ATLANTIS_PORT
              value: "4141"
            - name: ATLANTIS_ATLANTIS_URL
              value: "https://atlantis.git.open-ict.hu"
            - name: ATLANTIS_REPO_ALLOWLIST
              value: "git.open-ict.hu/*"
            - name: ATLANTIS_GITEA_BASE_URL
              value: "http://gitea-http.gitea.svc.cluster.local:3000"
            - name: ATLANTIS_REPO_CONFIG
              value: /etc/atlantis/repos.yaml
            - name: ATLANTIS_GITEA_USER
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: username
            - name: ATLANTIS_GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: token
            - name: ATLANTIS_GITEA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: webhook-secret
            # Garage S3 credentials injected into Terraform processes as AWS_* env vars
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: secret-access-key
            - name: AWS_ENDPOINT_URL_S3
              value: "http://garage.atlantis.svc.cluster.local:3900"
            - name: AWS_REGION
              value: "garage"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 60
          volumeMounts:
            - name: data
              mountPath: /atlantis
            - name: repos-config
              mountPath: /etc/atlantis/repos.yaml
              subPath: repos.yaml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: repos-config
          configMap:
            name: atlantis-repos
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
