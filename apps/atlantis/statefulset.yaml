apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlantis
  namespace: atlantis
  labels: &labels
    app.kubernetes.io/name: atlantis
    app.kubernetes.io/part-of: gitops

spec:
  serviceName: atlantis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlantis

  template:
    metadata:
      labels: *labels

    spec:
      serviceAccountName: atlantis

      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: atlantis
          image: ghcr.io/runatlantis/atlantis:v0.31.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              git config --file /tmp/gitconfig \
                "url.http://gitea-http.gitea.svc.cluster.local:3000/.insteadOf" \
                "https://${ATLANTIS_GITEA_USER}:${ATLANTIS_GITEA_TOKEN}@git.open-ict.hu/"
              git config --file /tmp/gitconfig --add \
                "url.http://gitea-http.gitea.svc.cluster.local:3000/.insteadOf" \
                "https://git.open-ict.hu/"
              git config --file /tmp/gitconfig \
                "credential.http://gitea-http.gitea.svc.cluster.local:3000.helper" \
                '!f(){ echo username=$ATLANTIS_GITEA_USER; echo password=$ATLANTIS_GITEA_TOKEN; }; f'
              exec /usr/local/bin/docker-entrypoint.sh server

          ports:
            - name: http
              containerPort: 4141

          env:
            - { name: ATLANTIS_DATA_DIR, value: /atlantis }
            - { name: ATLANTIS_PORT, value: "4141" }
            - { name: ATLANTIS_ATLANTIS_URL, value: "https://atlantis.git.open-ict.hu" }
            - { name: ATLANTIS_REPO_ALLOWLIST, value: "git.open-ict.hu/*" }
            - { name: ATLANTIS_GITEA_BASE_URL, value: "http://gitea-http.gitea.svc.cluster.local:3000" }
            - { name: ATLANTIS_REPO_CONFIG, value: /etc/atlantis/repos.yaml }
            - { name: GIT_CONFIG_GLOBAL, value: /tmp/gitconfig }
            - name: ATLANTIS_GITEA_USER
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: username
            - name: ATLANTIS_GITEA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: token
            - name: ATLANTIS_GITEA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: atlantis-vcs
                  key: webhook-secret
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-s3-credentials
                  key: secret-access-key
            - { name: AWS_ENDPOINT_URL_S3, value: "http://garage.atlantis.svc.cluster.local:3900" }
            - { name: AWS_REGION, value: "garage" }

          livenessProbe: &probe
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 60

          readinessProbe: *probe

          volumeMounts:
            - name: data
              mountPath: /atlantis

            - name: repos-config
              mountPath: /etc/atlantis/repos.yaml
              subPath: repos.yaml
              readOnly: true

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]

      volumes:
        - name: repos-config
          configMap:
            name: atlantis-repos

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
