apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: garage-restrict
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: garage
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # S3 API access from Atlantis (Terraform remote state backend)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: atlantis
      ports:
        - protocol: TCP
          port: 3900
    # Inter-node replication RPC between Garage pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3901
  egress:
    # Inter-node replication RPC to peer Garage pods
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3901
    # DNS resolution for peer discovery via the headless service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
