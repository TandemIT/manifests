apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Garage runs in the atlantis namespace alongside Atlantis.
# The namespace is created by apps/atlantis/namespace.yaml — apply atlantis/ first.
namespace: atlantis

resources:
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - networkpolicy.yaml
