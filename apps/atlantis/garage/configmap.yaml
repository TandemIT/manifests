apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config-tmpl
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
data:
  # __RPC_SECRET__ and __POD_NAME__ are replaced at pod startup by the init
  # container (secret value from garage-rpc, pod name from the downward API).
  # Do not change the placeholder tokens.
  garage.toml: |
    metadata_dir = "/data/meta"
    data_dir     = "/data/data"
    db_engine    = "lmdb"

    replication_factor = 3

    rpc_bind_addr   = "[::]:3901"
    rpc_public_addr = "__POD_NAME__.garage-headless.atlantis.svc.cluster.local:3901"
    rpc_secret      = "__RPC_SECRET__"

    [s3_api]
    s3_region    = "garage"
    api_bind_addr = "[::]:3900"
    root_domain  = ".s3.garage"

    [admin]
    api_bind_addr = "[::]:3903"
