apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

commonAnnotations:
  # Basic ownership/traceability annotations for GitOps and monitoring tools.
  app.kubernetes.io/part-of: platform-ingress
  app.kubernetes.io/managed-by: kustomize

# Traefik needs its CRDs for Middleware and TCP routing support.
resources:
- https://raw.githubusercontent.com/traefik/traefik/v3.3.4/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml
- namespace.yaml
- serviceaccount.yaml
- clusterrole.yaml
- clusterrolebinding.yaml
- deployment.yaml
- service.yaml
- ingressclass.yaml
