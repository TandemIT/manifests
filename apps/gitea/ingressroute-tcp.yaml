apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: gitea-ssh
  namespace: gitea
  annotations:
    kubernetes.io/ingress.class: traefik
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: source-control
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)
      services:
        # The Helm chart names the SSH Service <release>-ssh.
        - name: gitea-ssh
          port: 2222
