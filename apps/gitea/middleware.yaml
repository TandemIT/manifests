apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gitea-rate-limit
  namespace: gitea
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  # Basic abuse protection at edge; tune for real workload after observing traffic.
  rateLimit:
    average: 100
    burst: 200
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gitea-https-redirect
  namespace: gitea
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
