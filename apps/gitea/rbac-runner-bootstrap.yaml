# Lets the runner-token-bootstrap Job (gitea-runners namespace) read the
# gitea-admin secret it needs to call the Gitea admin API. Lives in this app
# because the Role must be created in the gitea namespace, and the
# gitea-runner kustomization force-rewrites namespaces to gitea-runners.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-token-bootstrap-read
  namespace: gitea
  labels:
    app.kubernetes.io/name: runner-token-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitea-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-token-bootstrap-read
  namespace: gitea
  labels:
    app.kubernetes.io/name: runner-token-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner-token-bootstrap-read
subjects:
  - kind: ServiceAccount
    name: runner-token-bootstrap
    namespace: gitea-runners
