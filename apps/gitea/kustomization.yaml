apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure-level concerns owned by kustomize.
# Gitea application is deployed via: helm upgrade --install gitea gitea/gitea -f apps/gitea/values.yaml
resources:
  - namespace.yaml
  - middleware.yaml
  - ingressroute-tcp.yaml
  - networkpolicy.yaml
  - networkpolicy-certmanager.yaml
  - networkpolicy-valkey.yaml
  - networkpolicy-postgresql.yaml
