apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure owned by kustomize (routes, middleware, NetworkPolicies).
# The Gitea workload itself is the Helm chart in argocd/apps/gitea.yaml.
resources:
  - namespace.yaml
  - rbac-runner-bootstrap.yaml
  - middleware.yaml
  - ingressroute-tcp.yaml
  - networkpolicy.yaml
  - networkpolicy-certmanager.yaml
  - networkpolicy-valkey.yaml
  - networkpolicy-postgresql.yaml
