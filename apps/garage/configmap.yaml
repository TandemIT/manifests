apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config-tmpl
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
data:
  # __RPC_SECRET__ is replaced at pod startup by the init container using the
  # value from the garage-rpc Secret.  Do not change the placeholder token.
  garage.toml: |
    metadata_dir = "/data/meta"
    data_dir     = "/data/data"
    db_engine    = "lmdb"

    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_secret    = "__RPC_SECRET__"

    [s3_api]
    s3_region    = "garage"
    api_bind_addr = "[::]:3900"
    root_domain  = ".s3.garage"

    [admin]
    api_bind_addr = "127.0.0.1:3903"
