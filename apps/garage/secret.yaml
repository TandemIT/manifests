# garage-rpc  — must exist BEFORE Garage starts.
# Generate the value with:  openssl rand -hex 32
# Then replace GENERATE_WITH_OPENSSL_RAND_HEX_32 below with the output.
apiVersion: v1
kind: Secret
metadata:
  name: garage-rpc
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
type: Opaque
stringData:
  rpc-secret: "GENERATE_WITH_OPENSSL_RAND_HEX_32"
---
# garage-s3-credentials  — populated AFTER Garage is initialized.
#
# Initialization procedure (run once after first deploy):
#   NODE=$(kubectl -n atlantis exec statefulset/garage -- garage node id | awk '{print $1}')
#   kubectl -n atlantis exec statefulset/garage -- garage layout assign "$NODE" -z dc1 -c 1
#   kubectl -n atlantis exec statefulset/garage -- garage layout apply --version 1
#   kubectl -n atlantis exec statefulset/garage -- garage bucket create terraform-state
#   kubectl -n atlantis exec statefulset/garage -- garage key create atlantis
#   # Copy the access key ID and secret from the output of the last command,
#   # then run:
#   kubectl -n atlantis exec statefulset/garage -- \
#     garage bucket allow terraform-state --read --write --key atlantis
#
# Update this Secret with the values obtained above, then restart Atlantis:
#   kubectl -n atlantis rollout restart statefulset/atlantis
apiVersion: v1
kind: Secret
metadata:
  name: garage-s3-credentials
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
type: Opaque
stringData:
  access-key-id:     "REPLACE_AFTER_GARAGE_INIT"
  secret-access-key: "REPLACE_AFTER_GARAGE_INIT"
