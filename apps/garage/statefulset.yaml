apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: atlantis
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/part-of: gitops
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
        app.kubernetes.io/part-of: gitops
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed "s|__RPC_SECRET__|$RPC_SECRET|g" /tmpl/garage.toml > /config/garage.toml
          env:
            - name: RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-rpc
                  key: rpc-secret
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmpl
              readOnly: true
            - name: config
              mountPath: /config
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: garage
          image: docker.io/dxflrs/garage:v1.0.0
          command: ["/garage"]
          args: ["-c", "/etc/garage/garage.toml", "server"]
          ports:
            - name: s3
              containerPort: 3900
            - name: rpc
              containerPort: 3901
            - name: admin
              containerPort: 3903
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/garage
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config-tmpl
          configMap:
            name: garage-config-tmpl
        - name: config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
