apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Upstream release manifest (includes the metallb-system namespace and CRDs)
# plus our IP pool configuration. Deployed by the wave-1 "platform"
# Application; Traefik (wave 2) waits on it for its LoadBalancer IP.
resources:
  - https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
  - ipaddresspool.yaml
  - l2advertisement.yaml
