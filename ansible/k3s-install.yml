---
# Installs the K3s cluster by driving THIS repo's bootstrap scripts, so the
# install flags, kube-vip static pod, network foundation (platform/), and
# Argo CD handover live in exactly one place (scripts/01..03).
#
# The inventory (node IPs, VIP, K3s version, repo URL) is GENERATED by
# Terraform - run `terraform apply` (or deploy.sh) first.
#
# Argo CD is installed by 01-bootstrap-first-master.sh on the first control
# plane; there is deliberately no separate ArgoCD playbook.

- name: Prepare all nodes
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - git
        state: present

    - name: Clone manifests repository (scripts + kube-vip template must be local)
      ansible.builtin.git:
        repo: '{{ manifests_repo }}'
        dest: /opt/manifests
        version: '{{ manifests_revision }}'
        force: true

- name: Bootstrap first control plane (K3s + network foundation + Argo CD)
  hosts: "{{ groups['control_plane'][0] }}"
  become: true
  tasks:
    # The script is idempotent (kube-vip, k3s, platform/, secrets, Argo CD,
    # root app), so it is safe to re-run on a partially bootstrapped node.
    - name: Run 01-bootstrap-first-master.sh
      ansible.builtin.command:
        cmd: bash /opt/manifests/scripts/01-bootstrap-first-master.sh
      environment:
        VIP: '{{ k3s_vip }}'
        K3S_VERSION: '{{ k3s_version }}'
      register: bootstrap_result
      changed_when: true

    - name: Show bootstrap summary
      ansible.builtin.debug:
        msg: '{{ bootstrap_result.stdout_lines[-20:] }}'

    - name: Get K3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Save node token
      ansible.builtin.set_fact:
        k3s_node_token: '{{ node_token.content | b64decode | trim }}'

- name: Join additional control plane nodes (one at a time - etcd)
  hosts: "{{ groups['control_plane'][1:] }}"
  become: true
  serial: 1
  vars:
    k3s_token: "{{ hostvars[groups['control_plane'][0]]['k3s_node_token'] }}"
  tasks:
    - name: Run 02-join-control-plane.sh
      ansible.builtin.command:
        cmd: bash /opt/manifests/scripts/02-join-control-plane.sh
        creates: /usr/local/bin/k3s
      environment:
        VIP: '{{ k3s_vip }}'
        K3S_TOKEN: '{{ k3s_token }}'
        K3S_VERSION: '{{ k3s_version }}'

    - name: Wait for API server on this node
      ansible.builtin.wait_for:
        port: 6443
        delay: 5
        timeout: 300

- name: Join worker nodes
  hosts: workers
  become: true
  vars:
    k3s_token: "{{ hostvars[groups['control_plane'][0]]['k3s_node_token'] }}"
  tasks:
    - name: Run 03-join-worker.sh
      ansible.builtin.command:
        cmd: bash /opt/manifests/scripts/03-join-worker.sh
        creates: /usr/local/bin/k3s
      environment:
        VIP: '{{ k3s_vip }}'
        K3S_TOKEN: '{{ k3s_token }}'
        K3S_VERSION: '{{ k3s_version }}'

    - name: Wait for kubelet kubeconfig
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/agent/kubelet.kubeconfig
        timeout: 300

- name: Verify cluster and fetch kubeconfig
  hosts: "{{ groups['control_plane'][0] }}"
  become: true
  tasks:
    - name: Wait for all nodes to be Ready
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=Ready nodes --all --timeout=300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: wait_result
      retries: 5
      delay: 10
      until: wait_result.rc == 0
      changed_when: false

    - name: Get cluster info
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: cluster_info
      changed_when: false

    - name: Display cluster info
      ansible.builtin.debug:
        var: cluster_info.stdout_lines

    - name: Read kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_content

    # Point the local kubeconfig at the kube-vip VIP, not a single master -
    # it stays valid even if the first control plane node goes down.
    - name: Save kubeconfig locally (server = VIP)
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        content: "{{ kubeconfig_content.content | b64decode | regex_replace('127.0.0.1', k3s_vip) }}"
        dest: '{{ playbook_dir }}/../kubeconfig'
        mode: '0600'

    - name: Display success message
      ansible.builtin.debug:
        msg:
          - 'K3s cluster is ready - Argo CD is reconciling the stack from git.'
          - 'Kubeconfig (via VIP {{ k3s_vip }}): {{ playbook_dir }}/../kubeconfig'
          - 'Watch: KUBECONFIG={{ playbook_dir }}/../kubeconfig kubectl get applications -n argocd -w'
